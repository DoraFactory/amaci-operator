groups:
  - name: amaci-operator
    rules:
      - alert: AmaciOperatorInspectStale
        expr: time() - amaci_operator_last_successful_inspection_timestamp_seconds > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: aMACI operator inspect loop is stale
          description: No successful inspect task has been observed for more than 5 minutes.

      - alert: AmaciOperatorTallyStale
        expr: time() - amaci_operator_last_successful_tally_timestamp_seconds > 3600
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: aMACI operator tally loop is stale
          description: No successful tally task has been observed for more than 1 hour.

      - alert: AmaciOperatorBalanceLow
        expr: amaci_operator_balance_dora < 80
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: aMACI operator balance is low
          description: Operator balance has been below 80 DORA for 10 minutes.

      - alert: AmaciOperatorRetryExhausted
        expr: increase(amaci_operator_external_retry_exhausted_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: aMACI operator external retries exhausted
          description: At least one RPC or indexer request exhausted retries in the last 15 minutes.

      - alert: AmaciOperatorTaskDurationHigh
        expr: max(amaci_operator_task_duration_seconds) > 1800
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: aMACI operator task has been running too long
          description: A running task has exceeded 30 minutes continuously.
